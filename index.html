<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salish Sea Role Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Nunito font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap"
    rel="stylesheet"
  >

  <!-- Chart.js for the pie chart -->
  <script
    src="https://cdn.jsdelivr.net/npm/chart.js"
    defer
  ></script>

  <!-- Quiz CSS -->
  <link rel="stylesheet" href="salish-role-quiz.css">
</head>
<body>
  <section id="salish-sea-role-finder">
    <h3>Find your Salish Sea role</h3>
    <p>
      This short reflection uses roles inspired by the Salish Sea ecosystem to help you notice
      how you tend to show up in collective work and climate action. It’s an invitation, not
      a definition. Let what resonates land and leave the rest.
    </p>

    <div id="salish-role-app" class="salish-role-app"></div>
  </section>

  <!-- Quiz JS -->
  <script src="salish-role-quiz.js" defer></script>
</body>
</html>
